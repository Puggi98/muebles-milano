  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #232323;
      --gold: #c9a96e;
      --gold-light: #f5f0e8;
      --white: #ffffff;
      --bg: #f7f6f3;
      --card: #ffffff;
      --border: #e8e8e5;
      --gray: #9a9a9a;
      --gray-light: #f7f6f3;
      --red: #e74c3c;
      --green: #2ecc71;
      --font: 'Plus Jakarta Sans', sans-serif;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.03);
    }
    html, body { height: 100%; }
    body { font-family: var(--font); font-size: 13px; color: var(--primary); background: var(--bg); display: flex; flex-direction: column; }

    /* ── TOP BAR ── */
    #topbar {
      background: var(--white); color: var(--primary);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px; flex-shrink: 0; z-index: 200;
      border-bottom: 1px solid var(--border);
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { width: 34px; height: 34px; }
    .topbar-title { font-size: 12px; letter-spacing: 2.5px; font-weight: 700; color: var(--primary); }
    .topbar-subtitle { font-size: 9px; letter-spacing: 2px; color: var(--gray); margin-top: 2px; font-weight: 500; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    .btn { font-family: var(--font); font-size: 10px; letter-spacing: 1.2px; font-weight: 600;
           padding: 9px 20px; border-radius: 6px; cursor: pointer; border: none; transition: all .2s; }
    .btn-primary { background: var(--gold); color: var(--white); }
    .btn-primary:hover { background: #b8963d; }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 6px 14px; font-size: 9px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--primary); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    /* ── LAYOUT ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--white); color: var(--primary);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      border-right: 1px solid var(--border);
    }
    .sidebar-section-label {
      font-size: 9px; letter-spacing: 2.5px; color: var(--gray);
      padding: 24px 20px 10px; font-weight: 600; text-transform: uppercase;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; cursor: pointer; font-size: 11px; letter-spacing: .5px;
      color: var(--primary); transition: all .15s; border-left: 3px solid transparent;
      font-weight: 500; opacity: .7;
    }
    .sidebar-item:hover { background: var(--gray-light); opacity: 1; }
    .sidebar-item.active { background: var(--gold-light); color: var(--gold); border-left-color: var(--gold); opacity: 1; font-weight: 600; }
    .sidebar-item .icon { font-size: 15px; width: 22px; text-align: center; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }
    .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--white); }
    .sidebar-footer .btn { width: 100%; margin-bottom: 8px; text-align: center; display: block; padding: 10px; }
    .sidebar-link { font-size: 10px; color: var(--gray); letter-spacing: .5px; cursor: pointer; text-align: center; display: block; margin-top: 6px; text-decoration: none; transition: color .15s; font-weight: 500; }
    .sidebar-link:hover { color: var(--gold); }

    /* ── MAIN ── */
    #main { flex: 1; overflow-y: auto; padding: 32px 36px; background: var(--bg); }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: -.2px; }
    .page-header p { font-size: 13px; color: var(--gray); margin-top: 6px; font-weight: 400; }

    /* ── CARDS ── */
    .card { background: var(--card); border-radius: 8px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 11px; letter-spacing: 1.5px; font-weight: 700; color: var(--primary); }
    .card-header .badge { background: var(--gold); color: var(--white); font-size: 10px; letter-spacing: .5px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .card-body { padding: 20px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 10px; letter-spacing: 1.5px; color: var(--gray); margin-bottom: 6px; font-weight: 600; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 6px;
      font-family: var(--font); font-size: 13px; color: var(--primary);
      transition: border-color .2s, box-shadow .2s; background: var(--white); resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,.12);
    }
    .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .fields-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ── IMAGE FIELD ── */
    .img-field { display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: start; }
    .img-preview { width: 140px; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background: var(--gray-light); display: block; }
    .img-preview-empty { width: 140px; height: 90px; border-radius: 6px; border: 1px dashed var(--border); background: var(--gray-light); display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: .5px; color: var(--gray); }

    /* ── SUBCATEGORY BLOCK ── */
    .sub-block { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
    .sub-block-header { background: var(--gray-light); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .sub-block-header h4 { font-size: 11px; letter-spacing: 1.5px; font-weight: 700; color: var(--primary); }
    .sub-block-header .toggle { font-size: 16px; color: var(--gray); transition: transform .2s; }
    .sub-block-header.open .toggle { transform: rotate(180deg); }
    .sub-block-body { padding: 18px; display: none; }
    .sub-block-body.open { display: block; }
    .sub-separator { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── PRODUCT CARD GRID (admin) ── */
    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .prod-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--white); display: flex; flex-direction: column; transition: box-shadow .2s, transform .2s; }
    .prod-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .prod-card-img-wrap { position: relative; }
    .prod-card-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--gray-light); }
    .prod-card-badge-lbl { position: absolute; top: 8px; left: 8px; background: var(--gold); color: var(--white); font-size: 8px; letter-spacing: 1px; padding: 3px 9px; border-radius: 4px; font-weight: 700; }
    .prod-card-body { padding: 12px 14px 8px; flex: 1; }
    .prod-card-brand { font-size: 9px; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 3px; font-weight: 600; }
    .prod-card-name { font-size: 12px; color: var(--primary); line-height: 1.4; margin-bottom: 4px; font-weight: 600; }
    .prod-card-desc { font-size: 11px; color: var(--gray); line-height: 1.5; margin-bottom: 6px; }
    .prod-card-price { font-size: 13px; font-weight: 700; color: var(--primary); }
    .prod-card-actions { display: grid; grid-template-columns: 1fr 36px; gap: 6px; padding: 10px 12px 12px; border-top: 1px solid var(--border); margin-top: 6px; }
    .btn-edit-card { background: var(--primary); color: var(--white); border: none; border-radius: 6px; font-family: var(--font); font-size: 10px; letter-spacing: 1px; cursor: pointer; padding: 8px 12px; transition: background .2s; font-weight: 600; }
    .btn-edit-card:hover { background: var(--gold); }
    .btn-del-card { background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .btn-del-card:hover { background: var(--red); color: var(--white); border-color: var(--red); }
    .add-product-row { padding: 14px 0 4px; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 12px; width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2), 0 0 0 1px rgba(0,0,0,.05); }
    .modal-header { padding: 22px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; border-radius: 12px 12px 0 0; }
    .modal-header h3 { font-size: 13px; letter-spacing: 1.5px; font-weight: 700; color: var(--primary); }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray); line-height: 1; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
    .modal-close:hover { color: var(--primary); background: var(--gray-light); }
    .modal-body { padding: 28px; }
    .modal-footer { padding: 18px 28px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; position: sticky; bottom: 0; background: var(--white); border-radius: 0 0 12px 12px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 76px; right: 24px;
      background: var(--green); color: var(--white);
      padding: 14px 24px; border-radius: 8px;
      font-size: 12px; letter-spacing: .5px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(46,204,113,.3);
      transform: translateX(120%); transition: transform .3s ease;
      z-index: 2000;
    }
    #toast.show { transform: translateX(0); }

    /* ── UTILITIES ── */
    .text-gray { color: var(--gray); }
    .text-sm { font-size: 11px; letter-spacing: .3px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .empty-state { text-align: center; padding: 36px; color: var(--gray); font-size: 12px; letter-spacing: .5px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray); }
  </style>

  let catalog = {};

  /* ══════════════════════════════════════════
     LOAD / SAVE
  ══════════════════════════════════════════ */
  function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

  async function loadData() {
    try {
      const { data: catRow, error: catErr } = await supabase.from('catalog').select('data').eq('id', 1).single();
      const { data: txtRow, error: txtErr } = await supabase.from('texts').select('data').eq('id', 1).single();
      catalog = (catRow && catRow.data && !catErr) ? catRow.data : deepClone(DEFAULT_CATALOG);
      texts   = (txtRow && txtRow.data && !txtErr) ? txtRow.data : deepClone(DEFAULT_TEXTS);
      // Auto-save defaults to Supabase if empty
      if (!catRow || !catRow.data || catErr) {
        await supabase.from('catalog').update({ data: catalog, updated_at: new Date().toISOString() }).eq('id', 1);
      }
      if (!txtRow || !txtRow.data || txtErr) {
        await supabase.from('texts').update({ data: texts, updated_at: new Date().toISOString() }).eq('id', 1);
      }
    } catch(e) {
      console.warn('Supabase load failed, using defaults:', e);
      catalog = deepClone(DEFAULT_CATALOG);
      texts   = deepClone(DEFAULT_TEXTS);
    }
  }

  async function saveAll() {
    collectFormValues();
    await supabase.from('catalog').update({ data: catalog, updated_at: new Date().toISOString() }).eq('id', 1);
    await supabase.from('texts').update({ data: texts, updated_at: new Date().toISOString() }).eq('id', 1);
    showToast('✓ Cambios guardados correctamente');
  }

  async function resetAll() {
    if (!confirm('¿Resetear todo a los valores originales? Se perderán todos los cambios.')) return;
    await supabase.from('catalog').update({ data: null, updated_at: new Date().toISOString() }).eq('id', 1);
    await supabase.from('texts').update({ data: null, updated_at: new Date().toISOString() }).eq('id', 1);
    loadData().then(() => {
      renderSection(activeSection);
      showToast('↺ Valores restaurados');
    });
  }

  function openSite() {
    saveAll();
    window.open('index.html', '_blank');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ══════════════════════════════════════════
     COLLECT FORM VALUES (read inputs → state)
  ══════════════════════════════════════════ */
  function collectFormValues() {
    // Collect texts
    document.querySelectorAll('[data-text-key]').forEach(el => {
      texts[el.dataset.textKey] = el.value;
    });
    // Collect category hero images
    document.querySelectorAll('[data-hero-key]').forEach(el => {
      catalog[el.dataset.heroKey].heroImg = el.value;
    });
    // Collect subcategory home images
    document.querySelectorAll('[data-homeimg]').forEach(el => {
      const [cat, sub] = el.dataset.homeimg.split('/');
      if (catalog[cat] && catalog[cat].subcategories[sub]) {
        catalog[cat].subcategories[sub].homeImg = el.value;
      }
    });
  }

  /* ══════════════════════════════════════════
     NAVIGATION
  ══════════════════════════════════════════ */
  function setSection(key) {
    collectFormValues(); // save current form before switching
    activeSection = key;
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', el.dataset.section === key);
    });
    renderSection(key);
  }

  function renderSection(key) {
    const main = document.getElementById('main');
    if (key === 'general') {
      main.innerHTML = renderGeneral();
    } else if (catalog[key]) {
      main.innerHTML = renderCategory(key);
    }
  }

            <div class="img-field">
              <input type="text" data-text-key="heroImg" value="${esc(texts.heroImg)}"
                placeholder="https://..." oninput="previewImg(this,'prev-hero')" />
              <img id="prev-hero" class="img-preview" src="${esc(texts.heroImg)}" onerror="this.src=''" />
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>TEXTO PROMOCIONAL HERO</h3></div>
        <div class="card-body">
          <div class="fields-row">
            <div class="field">
              <label>TÍTULO PROMOCIONAL</label>
              <input type="text" data-text-key="heroPromoLabel" value="${esc(texts.heroPromoLabel)}" />
            </div>
            <div class="field">
              <label>SUBTÍTULO</label>
              <input type="text" data-text-key="heroPromoSub" value="${esc(texts.heroPromoSub)}" />
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>BANNER CENTRAL PROMO</h3></div>
        <div class="card-body">
          <div class="field">
            <label>ETIQUETA SUPERIOR</label>
            <input type="text" data-text-key="promoBannerLabel" value="${esc(texts.promoBannerLabel)}" />
          </div>
          <div class="field">
            <label>TÍTULO PRINCIPAL</label>
            <input type="text" data-text-key="promoBannerTitle" value="${esc(texts.promoBannerTitle)}" />
          </div>
          <div class="field">
            <label>DESCRIPCIÓN</label>
            <textarea data-text-key="promoBannerDesc" rows="3">${esc(texts.promoBannerDesc)}</textarea>
          </div>
        </div>
      </div>
    `;
  }

  /* ══════════════════════════════════════════
     RENDER: CATEGORY
  ══════════════════════════════════════════ */
  function renderCategory(catKey) {
    const cat = catalog[catKey];
    const subBlocks = Object.entries(cat.subcategories).map(([subKey, sub]) =>
      renderSubBlock(catKey, subKey, sub)
    ).join('');

    return `
      <div class="page-header">
        <h1>${cat.label}</h1>
        <p>Edita la imagen hero, las tarjetas de categoría y los productos</p>
      </div>

      <div class="card">
        <div class="card-header"><h3>IMAGEN HERO — ${cat.label.toUpperCase()}</h3></div>
        <div class="card-body">
          <div class="field">
            <label>URL DE LA IMAGEN (1600×800 recomendado)</label>
            <div class="img-field">
              <input type="text" data-hero-key="${catKey}" value="${esc(cat.heroImg)}"
                placeholder="https://..." oninput="previewImg(this,'prev-hero-${catKey}')" />
              <img id="prev-hero-${catKey}" class="img-preview" src="${esc(cat.heroImg)}" onerror="this.src=''" />
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>SUBCATEGORÍAS Y PRODUCTOS</h3>
          <span class="badge">${Object.keys(cat.subcategories).length} subcategorías</span>
        </div>
        <div class="card-body" style="padding:12px">
          ${subBlocks}
        </div>
      </div>
    `;
  }

  function renderSubBlock(catKey, subKey, sub) {
    const totalItems = sub.items ? sub.items.length : 0;
    const cards = (sub.items || []).map((item, idx) => `
      <div class="prod-card">
        <div class="prod-card-img-wrap">
          <img class="prod-card-thumb" src="${esc(item.img)}" onerror="this.src=''" alt="${esc(item.name)}" />
          ${item.badge ? `<span class="prod-card-badge-lbl">${esc(item.badge)}</span>` : ''}
        </div>
        <div class="prod-card-body">
          <div class="prod-card-brand">${esc(item.brand)}</div>
          <div class="prod-card-name">${esc(item.name)}</div>
          <div class="prod-card-desc">${esc(item.desc)}</div>
          <div class="prod-card-price">$${Number(item.price).toLocaleString('es-MX')}</div>
        </div>
        <div class="prod-card-actions">
          <button class="btn-edit-card" onclick="openProductModal('${catKey}','${subKey}',${idx})">✏ EDITAR</button>
          <button class="btn-del-card" onclick="deleteProduct('${catKey}','${subKey}',${idx})" title="Eliminar producto">×</button>
        </div>
      </div>`).join('');

    const blockId = `sub-${catKey}-${subKey}`;
    return `
      <div class="sub-block">
        <div class="sub-block-header open" onclick="toggleSubBlock('${blockId}')">
          <h4>${sub.label.toUpperCase()} <span class="text-gray" style="font-weight:300;font-size:9px;letter-spacing:1px;margin-left:8px">${totalItems} productos</span></h4>
          <span class="toggle">▾</span>
        </div>
        <div class="sub-block-body open" id="${blockId}">
          <div class="field">
            <label>IMAGEN DE TARJETA (PÁGINA DE INICIO)</label>
            <div class="img-field">
              <input type="text" data-homeimg="${catKey}/${subKey}" value="${esc(sub.homeImg||'')}"
                placeholder="https://..." oninput="previewImg(this,'prev-${catKey}-${subKey}')" />
              <img id="prev-${catKey}-${subKey}" class="img-preview" src="${esc(sub.homeImg||'')}" onerror="this.src=''" />
            </div>
          </div>
          <div class="sub-separator"></div>
          ${totalItems === 0
            ? '<div class="empty-state">Sin productos en esta subcategoría</div>'
            : `<div class="prod-grid">${cards}</div>`}
          <div class="add-product-row">
            <button class="btn btn-ghost btn-sm" onclick="openProductModal('${catKey}','${subKey}',null)">+ AGREGAR PRODUCTO</button>
          </div>
        </div>
      </div>`;
  }

  function toggleSubBlock(id) {
    const body = document.getElementById(id);
    const header = body.previousElementSibling;
    body.classList.toggle('open');
    header.classList.toggle('open');
  }

  /* ══════════════════════════════════════════
     PRODUCT MODAL
  ══════════════════════════════════════════ */
  function openProductModal(catKey, subKey, itemIndex) {
    collectFormValues();
    editingCtx = { catKey, subKey, itemIndex };
    const isNew = itemIndex === null;
    const item = isNew
      ? { brand:'', name:'', desc:'', price:0, img:'', badge:'' }
      : { ...catalog[catKey].subcategories[subKey].items[itemIndex] };

    const isCustomBadge = item.badge && !['NUEVO','EXCLUSIVO','CLÁSICO','MÁS VENDIDO',''].includes(item.badge);
    document.getElementById('modalTitle').textContent = isNew ? 'NUEVO PRODUCTO' : 'EDITAR PRODUCTO';
    document.getElementById('modalBody').innerHTML = `
      <!-- Preview superior -->
      <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:20px;padding:16px;background:var(--gray-light);border-radius:6px">
        <img id="m-img-prev" src="${esc(item.img)}" onerror="this.src=''"
          style="width:100px;height:100px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0;background:#eee" />
        <div>
          <div style="font-size:8px;letter-spacing:2px;color:var(--gold);margin-bottom:4px" id="m-prev-brand">${esc(item.brand)||'MARCA'}</div>
          <div style="font-size:14px;color:var(--primary);font-weight:500;line-height:1.3;margin-bottom:4px" id="m-prev-name">${esc(item.name)||'Nombre del producto'}</div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:6px" id="m-prev-desc">${esc(item.desc)||'Descripción'}</div>
          <div style="font-size:14px;font-weight:600;color:var(--primary)" id="m-prev-price">${item.price ? '$'+Number(item.price).toLocaleString('es-MX') : '$0'}</div>
        </div>
      </div>

      <div class="fields-row">
        <div class="field">
          <label>MARCA</label>
          <input type="text" id="m-brand" value="${esc(item.brand)}" placeholder="Ej: Cassina"
            oninput="document.getElementById('m-prev-brand').textContent=this.value||'MARCA'" />
        </div>
        <div class="field">
          <label>PRECIO (USD)</label>
          <input type="number" id="m-price" value="${item.price}" min="0" step="1"
            oninput="document.getElementById('m-prev-price').textContent='$'+(parseFloat(this.value)||0).toLocaleString('es-MX')" />
        </div>
      </div>
      <div class="field">
        <label>NOMBRE DEL PRODUCTO</label>
        <input type="text" id="m-name" value="${esc(item.name)}" placeholder="Ej: Sofá Sengu 3 Plazas"
          oninput="document.getElementById('m-prev-name').textContent=this.value||'Nombre del producto'" />
      </div>
      <div class="field">
        <label>DESCRIPCIÓN CORTA</label>
        <input type="text" id="m-desc" value="${esc(item.desc)}" placeholder="Ej: Tapizado en bouclé natural, patas de roble"
          oninput="document.getElementById('m-prev-desc').textContent=this.value||'Descripción'" />
      </div>
      <div class="field">
        <label>URL DE IMAGEN</label>
        <div class="img-field">
          <input type="text" id="m-img" value="${esc(item.img)}" placeholder="https://images.unsplash.com/..."
            oninput="document.getElementById('m-img-prev').src=this.value" />
          <img class="img-preview" src="${esc(item.img)}" onerror="this.src=''" style="width:140px;height:90px" />
        </div>
      </div>
      <div class="fields-row">
        <div class="field">
          <label>BADGE</label>
          <select id="m-badge" onchange="document.getElementById('m-badge-custom-wrap').style.display=this.value==='custom'?'':'none'">
            <option value="">Sin badge</option>
            ${['NUEVO','EXCLUSIVO','CLÁSICO','MÁS VENDIDO'].map(b => `<option value="${b}" ${item.badge===b?'selected':''}>${b}</option>`).join('')}
            <option value="custom" ${isCustomBadge?'selected':''}>Personalizado…</option>
          </select>
        </div>
        <div class="field" id="m-badge-custom-wrap" style="${isCustomBadge?'':'display:none'}">
          <label>TEXTO DEL BADGE</label>
          <input type="text" id="m-badge-custom" value="${isCustomBadge?esc(item.badge):''}" placeholder="Ej: OFERTA" />
        </div>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingCtx = null;
  }

  function saveProduct() {
    if (!editingCtx) return;
    const { catKey, subKey, itemIndex } = editingCtx;
    const badgeEl = document.getElementById('m-badge');
    const badge = badgeEl.value === 'custom'
      ? (document.getElementById('m-badge-custom').value.trim() || '')
      : badgeEl.value;

    const item = {
      brand: document.getElementById('m-brand').value.trim(),
      name:  document.getElementById('m-name').value.trim(),
      desc:  document.getElementById('m-desc').value.trim(),
      price: parseFloat(document.getElementById('m-price').value) || 0,
      img:   document.getElementById('m-img').value.trim(),
      badge: badge,
    };

    if (!item.name) { alert('El nombre del producto es obligatorio'); return; }

    const items = catalog[catKey].subcategories[subKey].items;
    if (itemIndex === null) {
      items.push(item);
    } else {
      items[itemIndex] = item;
    }

    closeModal();
    renderSection(activeSection);
    showToast(itemIndex === null ? '✓ Producto agregado' : '✓ Producto actualizado');
  }

  function deleteProduct(catKey, subKey, itemIndex) {
    const item = catalog[catKey].subcategories[subKey].items[itemIndex];
    if (!confirm(`¿Eliminar "${item.name}"?`)) return;
    catalog[catKey].subcategories[subKey].items.splice(itemIndex, 1);
    renderSection(activeSection);
    showToast('✓ Producto eliminado');
  }

  /* ══════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════ */
  function previewImg(input, previewId) {
    const img = document.getElementById(previewId);
    if (img) img.src = input.value;
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ══════════════════════════════════════════
     INIT
  ══════════════════════════════════════════ */
  // Init: render immediately with defaults, then try Supabase
  catalog = deepClone(DEFAULT_CATALOG);
  texts = deepClone(DEFAULT_TEXTS);
  renderSection('general');

  // Then try to load from Supabase in background
  loadData().then(() => renderSection(activeSection)).catch(() => {});
  </script>
</body>
</html>
